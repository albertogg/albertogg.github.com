{{ define "main" }}
  <div id="post" class="post">
    <h1>{{ .Title }}</h1>
    <div class="date">
      <p>{{ partial "date.html" . }}</p>
    </div> <!-- class date -->
    {{ if .Params.toc }}
    <aside>
      <h4>{{ i18n "tableOfContents" }}</h4>
      {{ .TableOfContents }}
    </aside>
    <hr class="toc">
    {{ end }}
    {{ .Content }}
  </div> <!-- id class post -->
{{ end }}

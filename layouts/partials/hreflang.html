{{- range .AllTranslations -}}
  <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
{{- end -}}

{{- $defaultLang := .Site.Home.Language.Lang -}}
{{- $default := . -}}
{{- if ne .Language.Lang $defaultLang -}}
  {{- range .Translations -}}
    {{- if eq .Language.Lang $defaultLang -}}
      {{- $default = . -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
<link rel="alternate" hreflang="x-default" href="{{ $default.Permalink }}">

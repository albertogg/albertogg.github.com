intro:
  other: |
    Soy ingeniero de software de Caracas, Venezuela, con más de 14 años de experiencia remota en consultorías, startups y grandes empresas.

    Me enfoco en aplicaciones web, con preferencia por backend e infraestructura en la nube en AWS y GCP.

    Diseño arquitecturas listas para producción con CI/CD y observabilidad, lidero equipos y proyectos pequeños, y optimizo costos en la nube.

    Actualmente trabajo con IA y aplicaciones agénticas.

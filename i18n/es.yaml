whatIOfferBody:
  other: |
    Ayudo a equipos a entregar plataformas web confiables más rápido, con arquitectura clara y menor costo en la nube.

    - Arquitectura cloud lista para producción (AWS/GCP)
    - Pipelines CI/CD con releases seguros y repetibles
    - Arquitectura de aplicaciones de IA y sistemas agénticos
    - Observabilidad, escalabilidad y optimización de costos cloud
